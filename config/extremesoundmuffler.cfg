# Configuration file

anchors {
    # Set to true to disable anchors [default: false]
    B:disableAnchors=false
}


general {
    # Volume set when pressed the mute button by default [range: 0.0 ~ 0.9, default: 0.0]
    D:defaultMuteVolume=0.0

    # Blacklisted Sounds - add the name of the sounds to blacklist, separated with comma [default: [ui.], [music.], [ambient.]]
    S:forbiddenSounds <
        ui.
        music.
        ambient.
     >

    # Allow the "ALL" sounds list to include the blacklisted sounds? [default: false]
    B:lawfulAllList=false

    # Set to true to move the muffle and play buttons to the left side of the GUI [default: false]
    B:leftButtons=false

    # Set to false to disable the tips in the Muffler screen [default: true]
    B:showTip=true

    # Set to true to use the dark theme [default: false]
    B:useDarkTheme=false
}


inventory_button {
    # Set to true to disable the Muffle button in the player inventory [default: false]
    B:disableInventoryButton=false

    # Coordinates of the Muffler button in the player inventory. You can change this in game by holding CTRL and LMB over the button and dragging it around [range: -2147483648 ~ 2147483647, default: 149]
    I:invButtonX=75

    # Coordinates of the Muffler button in the player inventory. You can change this in game by holding CTRL and LMB over the button and dragging it around [range: -2147483648 ~ 2147483647, default: 5]
    I:invButtonY=7
}


